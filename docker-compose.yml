name: pae

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: pae
      POSTGRES_PASSWORD: pae
      POSTGRES_DB: pae
    volumes:
      - pae_pgdata:/var/lib/postgresql/data
    ports:
      # LAN-reachable so the central Grafana (192.168.6.51) can query;
      # remote access is via the read-only grafana_ro role
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pae"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: ["pae", "api"]
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ingester:
    build: .
    command: ["pae", "ingest"]
    env_file: .env
    expose:
      - "9100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["pae", "worker"]
    env_file: .env
    expose:
      - "9100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pae_pgdata:

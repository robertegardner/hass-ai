# Basement CYD bar panel — ESP32-2432S028R (classic 2.8" Cheap Yellow Display),
# mounted PORTRAIT (ILI9341 native 240x320, no rotation needed).
#
# Built and flashed in the HA ESPHome add-on; this repo copy is the source of
# record. Sync guard: tests/test_cyd_bar.py asserts every entity reference below
# matches ha/basement_tablet/entities.py (edit there first, then re-paste here).
#
# Spec: docs/superpowers/specs/2026-07-19-cyd-bar-panel-design.md

esphome:
  name: basement-cyd-bar
  friendly_name: Basement Bar Panel

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret cyd_bar_api_key
  on_client_connected:
    - lvgl.widget.hide: status_dot
  on_client_disconnected:
    - if:
        condition:
          not:
            api.connected:
        then:
          - lvgl.widget.show: status_dot

ota:
  - platform: esphome
    password: !secret cyd_bar_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Basement-CYD-Bar"
    password: !secret cyd_bar_ap_password

captive_portal:

globals:
  - id: slider_pressed
    type: bool
    initial_value: 'false'

spi:
  - id: spi_tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: spi_touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    id: tft
    model: ILI9341
    spi_id: spi_tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never

touchscreen:
  - platform: xpt2046
    id: touch
    spi_id: spi_touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    transform:
      mirror_x: true
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 280
      y_max: 3860
    on_touch:
      - light.turn_on:
          id: backlight
          brightness: 100%
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm

light:
  - platform: monochromatic
    id: backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    internal: true

font:
  - file: gfonts://Roboto@500
    id: font_tile
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789% "
  - file: gfonts://Roboto@400
    id: font_small
    size: 15
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789% "

binary_sensor:
  - platform: homeassistant
    id: bar_on
    entity_id: light.bar_lights
    on_state:
      - lvgl.widget.update:
          id: bar_tile
          state:
            checked: !lambda return x;
      - if:
          condition:
            lambda: 'return !x && !id(slider_pressed);'
          then:
            - lvgl.slider.update:
                id: bar_slider
                value: 0
            - lvgl.label.update:
                id: bar_pct
                text: "0%"
  - platform: homeassistant
    id: cans_on
    entity_id: light.basement_cans
    on_state:
      - lvgl.widget.update:
          id: cans_tile
          state:
            checked: !lambda return x;

sensor:
  - platform: homeassistant
    id: bar_brightness
    entity_id: light.bar_lights
    attribute: brightness
    on_value:
      - if:
          condition:
            lambda: 'return !id(slider_pressed);'
          then:
            - lvgl.slider.update:
                id: bar_slider
                value: !lambda 'return isnan(x) ? 0 : (int) round(x / 2.55);'
            - lvgl.label.update:
                id: bar_pct
                text:
                  format: "%d%%"
                  args: ['isnan(x) ? 0 : (int) round(x / 2.55)']

lvgl:
  displays: [tft]
  touchscreens: [touch]
  buffer_size: 25%
  on_idle:
    - timeout: 30s
      then:
        - light.turn_on:
            id: backlight
            brightness: 30%
    - timeout: 5min
      then:
        - light.turn_off: backlight
        - lvgl.pause:
  theme:
    button:
      radius: 16
      bg_color: 0x1A1D23
      border_width: 1
      border_color: 0x2A2D33
      text_color: 0xF2F0EC
  pages:
    - id: main_page
      bg_color: 0x101216
      widgets:
        - obj:
            id: status_dot
            x: 114
            y: 4
            width: 12
            height: 12
            radius: 6
            bg_color: 0xE25555
            border_width: 0
        - button:
            id: bar_tile
            x: 8
            y: 20
            width: 109
            height: 108
            checkable: true
            checked:
              bg_color: 0x33270F
              border_color: 0xFFB354
              text_color: 0xFFB354
            widgets:
              - label:
                  align: CENTER
                  text: "BAR"
                  text_font: font_tile
            on_click:
              - homeassistant.action:
                  action: homeassistant.toggle
                  data:
                    entity_id: light.bar_lights
        - button:
            id: cans_tile
            x: 123
            y: 20
            width: 109
            height: 108
            checkable: true
            checked:
              bg_color: 0x33270F
              border_color: 0xFFB354
              text_color: 0xFFB354
            widgets:
              - label:
                  align: CENTER
                  text: "CANS"
                  text_font: font_tile
            on_click:
              - homeassistant.action:
                  action: homeassistant.toggle
                  data:
                    entity_id: light.basement_cans
        - label:
            x: 12
            y: 140
            text: "Bar Dimmer"
            text_font: font_small
            text_color: 0x8B8985
        - label:
            id: bar_pct
            x: 185
            y: 140
            text: "0%"
            text_font: font_small
            text_color: 0xF2F0EC
        - slider:
            id: bar_slider
            x: 12
            y: 166
            width: 216
            height: 48
            min_value: 0
            max_value: 100
            bg_color: 0x1A1D23
            indicator:
              bg_color: 0xFFB354
            knob:
              bg_color: 0xF2F0EC
            on_press:
              - globals.set:
                  id: slider_pressed
                  value: 'true'
            on_value:
              - lvgl.label.update:
                  id: bar_pct
                  text:
                    format: "%d%%"
                    args: ['(int) x']
            on_release:
              - globals.set:
                  id: slider_pressed
                  value: 'false'
              - if:
                  condition:
                    lambda: 'return x > 0;'
                  then:
                    - homeassistant.action:
                        action: light.turn_on
                        data:
                          entity_id: light.bar_lights
                          brightness_pct: !lambda 'return (int) x;'
                  else:
                    - homeassistant.action:
                        action: light.turn_off
                        data:
                          entity_id: light.bar_lights
        - button:
            id: all_off_btn
            x: 8
            y: 260
            width: 224
            height: 52
            bg_color: 0x241014
            border_color: 0xE25555
            widgets:
              - label:
                  align: CENTER
                  text: "ALL OFF"
                  text_font: font_tile
                  text_color: 0xE25555
            on_click:
              - homeassistant.action:
                  action: homeassistant.turn_off
                  data:
                    entity_id: >-
                      light.basement_cans, light.bar_lights,
                      light.game_room_ceiling, light.basement_foyer,
                      switch.basement_bathroom_lights,
                      light.0xc890a81f69ed0000, light.0xc890a81f577b0000,
                      light.right_row_1_front,
                      light.0xc890a81eb5df0000, light.0xc890a81f6ff30000,
                      light.right_row_2_3,
                      light.left_row_3_3, light.right_row_3_3,
                      light.left_rear_row_3, light.0xc890a81f5a530000,
                      light.0xc890a81ed77e0000
